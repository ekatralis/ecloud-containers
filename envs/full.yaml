name: xsuite-env
channels:
  - conda-forge
dependencies:
  - python=3.14
  - python-gil
  - meson
  - h5py
  - pytest
  - pytest-mock
  - cmake
  - pip
  - pip:
      - numpy 
      - scipy 
      - matplotlib 
      - cython 
      - ipympl
      - ipython 
      - setuptools
      - jupyter
      - pyklu
      - nafflib
