name: Build & push image on tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Build only full image for now
          - name: slim-cpu
            flavor: slim
            image: ghcr.io/ekatralis/ecloud-containers
            dockerfile: Dockerfile.cpu
            platforms: linux/amd64,linux/arm64
            tag_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(matrix.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.ref_name }}${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.tag_suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            FLAVOR=${{ matrix.flavor }}
            VERSION=${{ github.ref_name }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}